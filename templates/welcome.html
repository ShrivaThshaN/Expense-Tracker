<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome · Smart Expense Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="welcome-body">
    <a href="{{ url_for('home') }}" class="welcome-link" id="enter">
        <div class="welcome-stage">
            <!-- Floating background coins -->
            <div class="coin coin-1">₹</div>
            <div class="coin coin-2">₹</div>
            <div class="coin coin-3">₹</div>
            <div class="coin coin-4">₹</div>
            <div class="coin coin-5">₹</div>
            <div class="coin coin-6">₹</div>

            <div class="welcome-card">
                <div class="welcome-emoji">💰</div>
                <h1 class="welcome-title">
                    <span>W</span><span>e</span><span>l</span><span>c</span><span>o</span><span>m</span><span>e</span>
                </h1>
                <p class="welcome-sub">Track your expenses</p>
                <p class="welcome-cta">Click anywhere to begin</p>
            </div>
        </div>
    </a>

    <script>
        // Smooth fade-out before navigating to the dashboard.
        const link = document.getElementById('enter');
        link.addEventListener('click', function (e) {
            e.preventDefault();
            document.body.classList.add('fade-out');
            setTimeout(() => { window.location.href = link.href; }, 600);
        });
    </script>
</body>
</html>
